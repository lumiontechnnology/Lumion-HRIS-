<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumion HRIS – Login</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #f6f7fb;
    }

    .wrap {
      max-width: 420px;
      margin: 8vh auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .08);
      overflow: hidden;
    }

    header {
      background: #1f2937;
      color: #fff;
      padding: 16px 20px;
    }

    .content {
      padding: 20px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
    }
  </style>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config/env.js"></script>
  <script src="js/supabase.js"></script>
</head>

<body>
  <div class="wrap">
    <header>
      <h2>Welcome to Lumion HRIS</h2>
    </header>
    <div class="content">
      <form id="login-form">
        <label>Email</label>
        <input name="email" type="email" placeholder="you@company.com" required />
        <label>Password</label>
        <input name="password" type="password" placeholder="••••••••" required />
        <button type="submit">Login</button>
        <div class="small"><a href="signup.html">Create an account</a></div>
      </form>
      <div style="margin-top:12px; display:flex; gap:8px;">
        <button id="demo-user-btn" style="flex:1; padding:10px; border-radius:8px; background:#10b981; color:#fff; border:none; cursor:pointer;">Demo User</button>
        <button id="demo-admin-btn" style="flex:1; padding:10px; border-radius:8px; background:#ef4444; color:#fff; border:none; cursor:pointer;">Demo Admin</button>
      </div>
    </div>
  </div>
  <script type="module">
    import { handleLoginForm, loginLocal } from './js/auth.js';
    handleLoginForm();

    // Wire demo buttons to the local seeded accounts in `js/store.js`.
    // Admin: admin@lumion.com / admin123
    // User: stanford.george@lumion.com / user123
    const demoUser = () => loginLocal('stanford.george@lumion.com', 'user123');
    const demoAdmin = () => loginLocal('admin@lumion.com', 'admin123');
    document.getElementById('demo-user-btn')?.addEventListener('click', demoUser);
    document.getElementById('demo-admin-btn')?.addEventListener('click', demoAdmin);
  </script>
</body>

</html>
